<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">自研微信私人 Agent 系统架构</title>
  <desc id="desc">个人微信通过 iLink 接入 FastAPI 后端，后端连接 LangGraph Agent、DeepSeek、SQLite、天气和地图服务，并向 Web 控制台提供状态与聊天能力。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1100" height="520" rx="24" fill="#f8fafc"/>
  <rect x="34" y="34" width="1032" height="452" rx="20" fill="#ffffff" stroke="#dbe3ee"/>
  <text x="70" y="78" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#0f172a">自研微信私人 Agent 架构</text>
  <text x="70" y="110" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#64748b">本地优先、最小暴露面、运行数据留在 runtime/ 或 Docker 卷中</text>

  <g filter="url(#shadow)">
    <rect x="72" y="170" width="175" height="92" rx="14" fill="#e0f2fe" stroke="#38bdf8"/>
    <text x="160" y="206" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#075985">个人微信</text>
    <text x="160" y="234" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#0369a1">扫码登录 / 文本消息</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="320" y="150" width="210" height="132" rx="14" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="425" y="188" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" fill="#166534">FastAPI 后端</text>
    <text x="425" y="216" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#15803d">鉴权 / API / 静态控制台</text>
    <text x="425" y="242" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#15803d">iLink 轮询 / 日志脱敏</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="610" y="150" width="210" height="132" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="715" y="188" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" fill="#92400e">LangGraph Agent</text>
    <text x="715" y="216" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#a16207">上下文 / 工具白名单</text>
    <text x="715" y="242" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#a16207">天气与地图能力编排</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="884" y="150" width="150" height="132" rx="14" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="959" y="188" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" fill="#5b21b6">DeepSeek</text>
    <text x="959" y="216" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#6d28d9">Chat Completions</text>
    <text x="959" y="242" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#6d28d9">模型回复</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="320" y="350" width="175" height="76" rx="12" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="408" y="382" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" fill="#334155">SQLite</text>
    <text x="408" y="406" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#64748b">会话 / 消息 / 运行记录</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="558" y="350" width="175" height="76" rx="12" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="646" y="382" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" fill="#155e75">Open-Meteo</text>
    <text x="646" y="406" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#0e7490">无 Key 天气查询</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="794" y="350" width="175" height="76" rx="12" fill="#fff7ed" stroke="#fb923c"/>
    <text x="882" y="382" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" fill="#9a3412">高德 URI</text>
    <text x="882" y="406" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#c2410c">本地点别名导航</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="350" width="175" height="76" rx="12" fill="#fdf2f8" stroke="#f472b6"/>
    <text x="160" y="382" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" fill="#9d174d">Web 控制台</text>
    <text x="160" y="406" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#be185d">登录 / 聊天 / 状态</text>
  </g>

  <line x1="247" y1="216" x2="312" y2="216" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="530" y1="216" x2="602" y2="216" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="820" y1="216" x2="876" y2="216" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="330" y1="350" x2="234" y2="283" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="282" x2="410" y2="342" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="690" y1="282" x2="650" y2="342" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="282" x2="850" y2="342" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
</svg>
