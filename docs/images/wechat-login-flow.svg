<svg xmlns="http://www.w3.org/2000/svg" width="980" height="390" viewBox="0 0 980 390" role="img" aria-labelledby="title desc">
  <title id="title">微信登录流程</title>
  <desc id="desc">登录控制台后获取二维码，用微信扫码，轮询状态，登录成功后启动微信长轮询并回复文本消息。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="980" height="390" rx="22" fill="#f8fafc"/>
  <text x="48" y="58" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="27" font-weight="700" fill="#0f172a">微信登录与轮询流程</text>
  <text x="48" y="88" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#64748b">二维码登录凭证保存在 runtime/wechat_credentials.json，云端部署时需要重新扫码</text>

  <g>
    <rect x="48" y="134" width="136" height="92" rx="14" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
    <text x="116" y="170" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#075985">登录控制台</text>
    <text x="116" y="198" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#0369a1">WEB_PASSWORD</text>
  </g>
  <line x1="190" y1="180" x2="244" y2="180" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="254" y="134" width="136" height="92" rx="14" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="322" y="170" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#166534">获取二维码</text>
    <text x="322" y="198" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#15803d">POST /api/wechat/qr</text>
  </g>
  <line x1="396" y1="180" x2="450" y2="180" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="460" y="134" width="136" height="92" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="528" y="170" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#92400e">微信扫码</text>
    <text x="528" y="198" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#a16207">个人微信确认</text>
  </g>
  <line x1="602" y1="180" x2="656" y2="180" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="666" y="134" width="136" height="92" rx="14" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="734" y="170" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#5b21b6">轮询状态</text>
    <text x="734" y="198" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6d28d9">logged_in</text>
  </g>
  <line x1="808" y1="180" x2="862" y2="180" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="872" y="134" width="60" height="92" rx="14" fill="#fce7f3" stroke="#f472b6" stroke-width="2"/>
    <text x="902" y="168" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#9d174d">启动</text>
    <text x="902" y="192" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#9d174d">轮询</text>
  </g>

  <path d="M 902 226 C 902 302 710 320 528 320 C 346 320 156 302 116 232" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="276" y="286" width="428" height="52" rx="26" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="490" y="318" text-anchor="middle" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#475569">后续收到文本消息后：微信 → 后端 → Agent → DeepSeek → 微信回复</text>
</svg>
